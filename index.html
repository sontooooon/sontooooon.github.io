<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>今日のログ</title>

<style>
body{
  max-width:700px;
  margin:60px auto;
  font-family:sans-serif;
  line-height:1.8;
}

h1{
  font-size:28px;
}

.date{
  color:#888;
  margin-bottom:30px;
}

.box{
  margin-bottom:30px;
}

</style>

</head>

<body>

<h1>今日</h1>

<div class="date">
<script>
const d = new Date();
document.write(
d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()
);
</script>
</div>

<div class="box">
<h3>一言</h3>
虚無。
</div>

<div class="box">
<h3>メモ</h3>
・残業中にマンガ読んだ<br>
・セミイベント考えた
</div>

<div class="box">
<h3>気づき</h3>
午前はミスしやすい
</div>

<div class="box">
<h3>アイデア</h3>
映画上映会＋感想会
</div>

</body>
</html>
